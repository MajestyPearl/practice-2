<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Preview Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <img class="card__image" src="assets/images/Blog Image.png" alt="Blog image">

    <div class="card__content">

      <span class="card__category"> HTML & CSS</span>
      <small class="card__date">Публікація 28 Квітня 2026</small>

      <h3 class="card__title">
        Практична робота № 2
      </h3>

      <p class="card__text">
        HTML і CSS — основа вебсайтів: HTML задає структуру, CSS — оформлення.
      </p>

      <div class="card__author">
        <img src="assets/images/avatar-femail.png" alt="Author avatar">
        <span>Петрікей Маргарита </span>
      </div>

    </div>
  </div>

</body>
</html>
